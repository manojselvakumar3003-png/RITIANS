<!--
  ════════════════════════════════════════════════════════════════════
  HOW TO INTEGRATE LIVE TRACKING INTO YOUR EXISTING index.html
  ════════════════════════════════════════════════════════════════════

  Step 1: In your index.html, find this line inside the .nav-right div:
  
    <div class="clock" id="clockEl">

  Step 2: BEFORE that line, add this button:
  
    <a href="tracking.html" class="tab-btn" style="text-decoration:none;color:inherit">
      <i class="fas fa-satellite-dish"></i><span>Live Track</span>
    </a>

  Step 3: Optionally, in the .hero-tags section, add:
  
    <span class="hero-tag">
      <i class="fas fa-satellite-dish" style="color:var(--accent2)"></i>
      <a href="tracking.html" style="color:inherit;text-decoration:none">Live GPS Tracking</a>
    </span>

  Step 4: Also add a "Driver Portal" link in your Driver section's .admin-top div:
  
    <a href="driver.html" class="btn btn-ghost btn-sm" style="text-decoration:none">
      <i class="fas fa-satellite-dish"></i> Open GPS Portal
    </a>

  That's it! No other changes needed to your existing code.
  ════════════════════════════════════════════════════════════════════
-->
